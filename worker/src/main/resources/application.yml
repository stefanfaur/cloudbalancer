spring:
  application:
    name: cloudbalancer-worker
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${cloudbalancer.worker.id:worker-1}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

cloudbalancer:
  worker:
    id: ${WORKER_ID:worker-1}
    supported-executors: SIMULATED,SHELL
    cpu-cores: 4
    memory-mb: 8192
    disk-mb: 10240
    tags: []
    metrics-interval-ms: 5000
    heartbeat-interval-ms: 10000
    shell:
      blocked-commands: "rm -rf /,shutdown,reboot,mkfs,dd,:(){ :|:& };:"
      max-output-bytes: 1048576
    docker:
      host: unix:///var/run/docker.sock
    python:
      python-binary: python3
      network-isolation: true
    artifacts:
      max-size-bytes: 104857600
      dispatcher-url: ${DISPATCHER_URL:http://localhost:8080}
