server:
  port: 8080

spring:
  application:
    name: cloudbalancer-dispatcher
  datasource:
    url: jdbc:postgresql://localhost:5432/cloudbalancer
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        stringtype: unspecified
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: dispatcher
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

cloudbalancer:
  dispatcher:
    assignment-interval-ms: 1000
    heartbeat-suspect-threshold-seconds: 30
    heartbeat-dead-threshold-seconds: 60
    liveness-check-interval-ms: 10000
    artifact-base-path: ${ARTIFACT_BASE_PATH:artifacts}
    artifact-max-size-bytes: ${ARTIFACT_MAX_SIZE_BYTES:104857600}
  retry:
    scan-interval-ms: 5000
    base-delay-seconds: 5
    poison-pill-threshold-ms: 2000
  security:
    jwt-secret: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9ydGVzdGluZzEyMzQ1Njc4OTA=
    access-token-expiration-seconds: 900
    refresh-token-expiration-seconds: 604800
    rate-limit:
      admin: 200
      operator: 100
      viewer: 60
      api-client: 120
      anonymous: 10
