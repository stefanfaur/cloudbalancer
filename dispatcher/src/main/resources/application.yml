server:
  port: 8080

spring:
  application:
    name: cloudbalancer-dispatcher
  datasource:
    url: jdbc:h2:mem:cloudbalancer;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: dispatcher
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

cloudbalancer:
  dispatcher:
    assignment-interval-ms: 1000
  security:
    jwt-secret: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9ydGVzdGluZzEyMzQ1Njc4OTA=
    access-token-expiration-seconds: 900
    refresh-token-expiration-seconds: 604800
    rate-limit:
      admin: 200
      operator: 100
      viewer: 60
      api-client: 120
      anonymous: 10
