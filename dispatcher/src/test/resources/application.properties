# High rate limits for test suite to prevent cross-test bucket exhaustion
cloudbalancer.security.rate-limit.admin=10000
cloudbalancer.security.rate-limit.operator=10000
cloudbalancer.security.rate-limit.viewer=10000
cloudbalancer.security.rate-limit.api-client=10000
cloudbalancer.security.rate-limit.anonymous=10000

# Use AGENT runtime mode in tests to avoid DockerClient bean conflict with TestContainersConfig mock
cloudbalancer.dispatcher.scaling.runtime-mode=AGENT
