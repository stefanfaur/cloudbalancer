# docker/docker-compose.dev.yml
# CloudBalancer development stack — Phase 5: Kafka + TimescaleDB + Metrics

services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: cloudbalancer-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:29093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: cloudbalancer-dev-cluster-001

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: cloudbalancer-postgres
    environment:
      POSTGRES_DB: cloudbalancer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  metrics-aggregator:
    build:
      context: ..
      dockerfile: metrics-aggregator/Dockerfile
    container_name: cloudbalancer-metrics-aggregator
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cloudbalancer
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  pgdata:
