# docker/docker-compose.dev.yml
# CloudBalancer development stack — full service mesh

services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: cloudbalancer-kafka
    ports:
      - "9092:9092"
      - "29094:29094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:29093,EXTERNAL://:9092,REMOTE://:29094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092,REMOTE://${KAFKA_REMOTE_HOST:-localhost}:29094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,REMOTE:SASL_PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_LISTENER_NAME_REMOTE_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="admin" password="${KAFKA_ADMIN_PASSWORD:-admin-secret}"
        user_cloudbalancer-agent="${KAFKA_AGENT_PASSWORD:-changeme}";
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: cloudbalancer-dev-cluster-001

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: cloudbalancer-postgres
    environment:
      POSTGRES_DB: cloudbalancer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: cloudbalancer-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dispatcher
      - metrics-aggregator

  dispatcher:
    build:
      context: ..
      dockerfile: dispatcher/Dockerfile
    container_name: cloudbalancer-dispatcher
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cloudbalancer
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SCALING_RUNTIME_MODE: AGENT
      KAFKA_EXTERNAL_BOOTSTRAP: ${KAFKA_REMOTE_HOST:-localhost}:29094
      KAFKA_AGENT_USERNAME: cloudbalancer-agent
      KAFKA_AGENT_PASSWORD: ${KAFKA_AGENT_PASSWORD:-changeme}
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
    container_name: cloudbalancer-worker-1
    privileged: true
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      WORKER_ID: worker-1
      DISPATCHER_URL: http://dispatcher:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      kafka:
        condition: service_started
      dispatcher:
        condition: service_started

  metrics-aggregator:
    build:
      context: ..
      dockerfile: metrics-aggregator/Dockerfile
    container_name: cloudbalancer-metrics-aggregator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cloudbalancer
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy

  worker-agent-1:
    build:
      context: ..
      dockerfile: worker-agent/Dockerfile
    container_name: cloudbalancer-agent-1
    privileged: true
    environment:
      AGENT_ID: agent-1
      AGENT_CPU_CORES: 8
      AGENT_MEMORY_MB: 16384
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DOCKER_WORKER_IMAGE: docker-worker
      DOCKER_NETWORK_NAME: docker_default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      kafka:
        condition: service_started

  worker-agent-2:
    build:
      context: ..
      dockerfile: worker-agent/Dockerfile
    container_name: cloudbalancer-agent-2
    privileged: true
    environment:
      AGENT_ID: agent-2
      AGENT_CPU_CORES: 4
      AGENT_MEMORY_MB: 8192
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DOCKER_WORKER_IMAGE: docker-worker
      DOCKER_NETWORK_NAME: docker_default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      kafka:
        condition: service_started

volumes:
  pgdata:
